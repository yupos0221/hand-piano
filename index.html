<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hand Piano — 指のピンチで演奏</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="logo">Hand<span>Piano</span></div>
  <div class="header-right">
    <div id="status">
      <div id="status-dot"></div>
      <span id="status-text">カメラ未起動</span>
    </div>
    <button id="cam-toggle-btn" disabled>📷 カメラ画像</button>
    <button id="reset-btn" title="全ての音をリセット">🔄 リセット</button>
  </div>
</header>

<main>
  <!-- 1. カメラ映像（鳴っている音を重畳） -->
  <div id="camera-wrap">
    <video id="video" playsinline></video>
    <canvas id="canvas"></canvas>
    <div id="note-overlay"></div>
    <div id="semi-cam-bar" style="display:none">
      <div class="semi-hand-row">
        <span class="semi-hand-label">右手</span>
        <span id="semi-cam-mpL" class="semi-badge semi-nat">♮</span>
      </div>
      <div class="semi-hand-row">
        <span class="semi-hand-label">左手</span>
        <span id="semi-cam-mpR" class="semi-badge semi-nat">♮</span>
      </div>
    </div>
    <div id="octave-cam-bar">
      <div class="oct-hand-row">
        <span class="oct-hand-label">右手</span>
        <span class="oct-seg" id="oct-c-l-low">低</span>
        <span class="oct-seg" id="oct-c-l-mid">中</span>
        <span class="oct-seg" id="oct-c-l-high">高</span>
      </div>
      <div class="oct-hand-row">
        <span class="oct-hand-label">左手</span>
        <span class="oct-seg" id="oct-c-r-low">低</span>
        <span class="oct-seg" id="oct-c-r-mid">中</span>
        <span class="oct-seg" id="oct-c-r-high">高</span>
      </div>
    </div>
    <div id="placeholder">
      <div class="placeholder-icon">🎹</div>
      <p>カメラを起動して<br>指のピンチで演奏しよう</p>
      <button id="start-btn">カメラ起動</button>
    </div>
    <div id="error-msg"></div>
  </div>

  <div id="visualizer">
    <div id="vis-label">SOUND</div>
    <div id="vis-bars"></div>
  </div>

  <!-- 2. オクターブモード -->
  <div id="octave-panel">
    <div id="oct-panel-top">
      <div id="oct-panel-label">OCTAVE MODE</div>
      <button id="octave-mode-btn">オクターブモード OFF</button>
      <div id="oct-panel-segs">
        <div class="oct-hand-row">
          <span class="oct-hand-label">右手</span>
          <span class="oct-seg" id="oct-p-l-low">低<br><small>近い</small></span>
          <span class="oct-seg" id="oct-p-l-mid">中<br><small>通常</small></span>
          <span class="oct-seg" id="oct-p-l-high">高<br><small>遠い</small></span>
        </div>
        <div class="oct-hand-row">
          <span class="oct-hand-label">左手</span>
          <span class="oct-seg" id="oct-p-r-low">低<br><small>近い</small></span>
          <span class="oct-seg" id="oct-p-r-mid">中<br><small>通常</small></span>
          <span class="oct-seg" id="oct-p-r-high">高<br><small>遠い</small></span>
        </div>
      </div>
    </div>
    <div id="oct-controls">
      <div class="oct-ctrl-row">
        <span class="oct-ctrl-label">低 ↔ 中</span>
        <input type="range" class="oct-slider" id="slider-close" min="0.10" max="0.40" step="0.01" value="0.23">
        <span class="oct-ctrl-val" id="val-close">0.23</span>
      </div>
      <div class="oct-ctrl-row">
        <span class="oct-ctrl-label">中 ↔ 高</span>
        <input type="range" class="oct-slider" id="slider-far" min="0.05" max="0.30" step="0.01" value="0.13">
        <span class="oct-ctrl-val" id="val-far">0.13</span>
      </div>
      <div class="oct-ctrl-hint">手のサイズ（参考）: <span id="oct-size-display">—</span></div>
    </div>
  </div>

  <!-- 3. 楽器選択 -->
  <div id="instrument-selector">
    <div id="inst-label">INSTRUMENT</div>
    <div id="inst-buttons">
      <button class="inst-btn active" data-inst="piano">ピアノ</button>
      <button class="inst-btn" data-inst="trumpet">トランペット</button>
      <button class="inst-btn" data-inst="guitar">ギター</button>
      <button class="inst-btn" data-inst="clarinet">クラリネット</button>
      <button class="inst-btn" data-inst="flute">フルート</button>
      <button class="inst-btn" data-inst="bell">ベル</button>
    </div>
  </div>

  <!-- 4. 調選択 -->
  <div id="tonality-panel">
    <div class="ton-row">
      <div class="ton-section-label">TONALITY</div>
      <div id="ton-mode-btns">
        <button class="ton-mode-btn active" data-mode="major">長調</button>
        <button class="ton-mode-btn" data-mode="minor">短調</button>
      </div>
    </div>
    <div class="ton-row">
      <span class="ton-group-label">♯系</span>
      <div class="ton-key-btns">
        <button class="ton-key-btn active" data-semitone="0">C</button>
        <button class="ton-key-btn" data-semitone="7">G</button>
        <button class="ton-key-btn" data-semitone="2">D</button>
        <button class="ton-key-btn" data-semitone="9">A</button>
        <button class="ton-key-btn" data-semitone="4">E</button>
        <button class="ton-key-btn" data-semitone="11">B</button>
        <button class="ton-key-btn" data-semitone="6">F♯</button>
      </div>
    </div>
    <div class="ton-row">
      <span class="ton-section-label" style="min-width:72px">傾き感度</span>
      <input type="range" id="slider-tilt" class="oct-slider" min="0.10" max="0.60" step="0.01" value="0.30">
      <span class="oct-ctrl-val" id="val-tilt">0.30</span>
      <span style="font-size:10px;color:var(--text3);margin-left:4px">左♭ ← → ♯右</span>
    </div>
    <div class="ton-row">
      <span class="ton-group-label">♭系</span>
      <div class="ton-key-btns">
        <button class="ton-key-btn" data-semitone="5">F</button>
        <button class="ton-key-btn" data-semitone="10">B♭</button>
        <button class="ton-key-btn" data-semitone="3">E♭</button>
        <button class="ton-key-btn" data-semitone="8">A♭</button>
        <button class="ton-key-btn" data-semitone="1">D♭</button>
        <button class="ton-key-btn" data-semitone="6">G♭</button>
      </div>
    </div>
  </div>

  <!-- 5. ピンチ対応表 -->
  <div class="card">
    <div class="card-label">ピンチ対応表</div>
    <div id="guide"></div>
  </div>
</main>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="script.js"></script>
</body>
</html>
