<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hand Piano — 指のピンチで演奏</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --bg2: #18181c;
      --bg3: #222228;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f0f0f2;
      --text2: #9898a6;
      --text3: #5a5a68;
      --green: #1D9E75;
      --green-light: #5DCAA5;
      --green-dark: #0F6E56;
      --green-bg: #04342C;
      --amber: #EF9F27;
      --red: #e24b4a;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
    }

    header {
      width: 100%;
      max-width: 860px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .logo span { color: var(--green-light); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #reset-btn {
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border2);
      background: var(--bg3);
      color: var(--text2);
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }

    #reset-btn:hover { 
      background: #2a2a32; 
      border-color: var(--red);
      color: var(--red); 
    }

    #status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--text2);
    }

    #status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text3);
      transition: background 0.3s;
      flex-shrink: 0;
    }

    #status-dot.active { background: var(--green); }
    #status-dot.detecting { background: var(--amber); }

    main {
      width: 100%;
      max-width: 860px;
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 14px;
    }

    /* camera */
    #camera-wrap {
      position: relative;
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      aspect-ratio: 4/3;
      width: 100%;
    }

    #video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      display: none;
    }

    #canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
    }

    #placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text2);
      font-size: 14px;
      text-align: center;
      padding: 1.5rem;
    }

    .placeholder-icon {
      font-size: 48px;
      color: var(--text3);
      line-height: 1;
      margin-bottom: 4px;
    }

    #start-btn {
      margin-top: 8px;
      padding: 10px 28px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border2);
      background: var(--bg3);
      color: var(--text);
      transition: background 0.15s, border-color 0.15s;
      letter-spacing: 0.01em;
    }

    #start-btn:hover { background: #2a2a32; border-color: var(--green); color: var(--green-light); }
    #start-btn:disabled { opacity: 0.5; cursor: default; }

    /* right panel */
    #right-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
    }

    .card-label {
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 10px;
    }

    /* notes grid */
    #notes-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .note-cell {
      aspect-ratio: 1;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border);
      background: var(--bg3);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      transition: background 0.07s, border-color 0.07s;
    }

    .note-cell .note-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .note-cell .note-hint {
      font-size: 8px;
      color: var(--text3);
      text-align: center;
      line-height: 1.3;
    }

    .note-cell.active {
      background: var(--green-bg);
      border-color: var(--green);
    }

    .note-cell.active .note-name { color: var(--green-light); }
    .note-cell.active .note-hint { color: var(--green-dark); }

    /* guide */
    .guide-section-title {
      font-size: 9px;
      color: var(--text3);
      margin-bottom: 6px;
      margin-top: 2px;
      letter-spacing: 0.06em;
    }

    .guide-section-title:first-child {
      margin-top: 0;
    }

    .guide-section-title + .guide-section-title {
      margin-top: 10px;
    }

    .guide-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 0;
      font-size: 12px;
      color: var(--text2);
      border-bottom: 0.5px solid var(--border);
    }

    .guide-row:last-child { border-bottom: none; }

    .guide-fingers {
      font-size: 11px;
      color: var(--text2);
    }

    .guide-note {
      font-size: 13px;
      font-weight: 600;
      color: var(--green-light);
      min-width: 28px;
      text-align: right;
    }

    /* visualizer */
    #visualizer {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      grid-column: 1 / -1;
    }

    #vis-label {
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    #vis-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 32px;
      flex: 1;
    }

    .vis-bar {
      flex: 1;
      background: var(--bg3);
      border-radius: 2px;
      height: 3px;
      transition: height 0.04s;
      min-width: 3px;
    }

    .vis-bar.lit { background: var(--green); }

    /* error */
    #error-msg {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      background: rgba(14,14,16,0.9);
      font-size: 13px;
      color: #e24b4a;
      text-align: center;
      padding: 1rem;
      flex-direction: column;
      gap: 8px;
    }

    /* responsive */
    @media (max-width: 600px) {
      main { grid-template-columns: 1fr; }
      #visualizer { grid-column: 1; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Hand<span>Piano</span></div>
  <div class="header-right">
    <button id="reset-btn" title="全ての音をリセット">🔄 リセット</button>
    <div id="status">
      <div id="status-dot"></div>
      <span id="status-text">カメラ未起動</span>
    </div>
  </div>
</header>

<main>
  <div id="camera-wrap">
    <video id="video" playsinline></video>
    <canvas id="canvas"></canvas>
    <div id="placeholder">
      <div class="placeholder-icon">🎹</div>
      <p>カメラを起動して<br>指のピンチで演奏しよう</p>
      <button id="start-btn">カメラ起動</button>
    </div>
    <div id="error-msg"></div>
  </div>

  <div id="right-panel">
    <div class="card">
      <div class="card-label">鳴っている音</div>
      <div id="notes-grid"></div>
    </div>
    <div class="card">
      <div class="card-label">ピンチ対応表</div>
      <div id="guide"></div>
    </div>
  </div>

  <div id="visualizer">
    <div id="vis-label">SOUND</div>
    <div id="vis-bars"></div>
  </div>
</main>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
// ── 音階定義 ───────────────────────────────────────────
const NOTE_MAP = [
  { name: 'ド',   freq: 261.63, fingers: [0, 1], label: '親指＋人差し指', hand: 'Right' },
  { name: 'レ',   freq: 293.66, fingers: [0, 2], label: '親指＋中指', hand: 'Right' },
  { name: 'ミ',   freq: 329.63, fingers: [0, 3], label: '親指＋薬指', hand: 'Right' },
  { name: 'ファ', freq: 349.23, fingers: [0, 4], label: '親指＋小指', hand: 'Right' },
  { name: 'ソ',   freq: 392.00, fingers: [0, 1], label: '親指＋人差し指', hand: 'Left' },
  { name: 'ラ',   freq: 440.00, fingers: [0, 2], label: '親指＋中指', hand: 'Left' },
  { name: 'シ',   freq: 493.88, fingers: [0, 3], label: '親指＋薬指', hand: 'Left' },
  { name: 'ド′',  freq: 523.25, fingers: [0, 4], label: '親指＋小指', hand: 'Left' },
];

const FINGERTIPS  = [4, 8, 12, 16, 20];

// ── AudioContext（改善版） ─────────────────────────────
let audioCtx = null;
const activeOsc = {};
let noteReleaseTimers = {}; // 音の解放タイマー

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function startNote(freq, key) {
  const ctx = getCtx();
  
  // 既に同じ音が鳴っている場合は一旦停止して再スタート（8分音符対応）
  if (activeOsc[key]) {
    forceStopNote(key);
  }
  
  // タイマーをクリア
  if (noteReleaseTimers[key]) {
    clearTimeout(noteReleaseTimers[key]);
    delete noteReleaseTimers[key];
  }

  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0.28, ctx.currentTime + 0.02);

  const osc2  = ctx.createOscillator();
  const gain2 = ctx.createGain();
  osc2.type = 'triangle';
  osc2.frequency.value = freq * 2;
  gain2.gain.setValueAtTime(0, ctx.currentTime);
  gain2.gain.linearRampToValueAtTime(0.06, ctx.currentTime + 0.02);

  osc.connect(gain).connect(ctx.destination);
  osc2.connect(gain2).connect(ctx.destination);
  osc.start(); 
  osc2.start();
  
  activeOsc[key] = { osc, gain, osc2, gain2, freq, startTime: ctx.currentTime };
}

function stopNote(key) {
  const p = activeOsc[key];
  if (!p) return;
  
  const ctx = getCtx();
  
  try {
    // 現在のゲイン値を取得してスムーズにフェードアウト
    const currentGain = p.gain.gain.value;
    const currentGain2 = p.gain2.gain.value;
    
    p.gain.gain.cancelScheduledValues(ctx.currentTime);
    p.gain2.gain.cancelScheduledValues(ctx.currentTime);
    p.gain.gain.setValueAtTime(currentGain, ctx.currentTime);
    p.gain2.gain.setValueAtTime(currentGain2, ctx.currentTime);
    p.gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.05);
    p.gain2.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.05);
  } catch(e) {}
  
  noteReleaseTimers[key] = setTimeout(() => {
    try {
      p.osc.stop();
      p.osc2.stop();
      p.osc.disconnect();
      p.osc2.disconnect();
      p.gain.disconnect();
      p.gain2.disconnect();
    } catch(e) {}
    delete activeOsc[key];
    delete noteReleaseTimers[key];
  }, 60);
}

function forceStopNote(key) {
  const p = activeOsc[key];
  if (!p) return;
  
  if (noteReleaseTimers[key]) {
    clearTimeout(noteReleaseTimers[key]);
    delete noteReleaseTimers[key];
  }
  
  try {
    const ctx = getCtx();
    p.gain.gain.cancelScheduledValues(ctx.currentTime);
    p.gain2.gain.cancelScheduledValues(ctx.currentTime);
    p.gain.gain.setValueAtTime(0, ctx.currentTime);
    p.gain2.gain.setValueAtTime(0, ctx.currentTime);
    p.osc.stop();
    p.osc2.stop();
    p.osc.disconnect();
    p.osc2.disconnect();
    p.gain.disconnect();
    p.gain2.disconnect();
  } catch(e) {}
  delete activeOsc[key];
}

function forceStopAllNotes() {
  // 全てのタイマーをクリア
  Object.keys(noteReleaseTimers).forEach(key => {
    clearTimeout(noteReleaseTimers[key]);
  });
  noteReleaseTimers = {};
  
  // 全てのオシレーターを強制停止
  Object.keys(activeOsc).forEach(key => {
    forceStopNote(key);
  });
}

// ── UI 構築 ────────────────────────────────────────────
const notesGrid = document.getElementById('notes-grid');
const guide     = document.getElementById('guide');
const cellMap   = {};

NOTE_MAP.forEach((n, i) => {
  const cell = document.createElement('div');
  cell.className = 'note-cell';
  cell.innerHTML = `<span class="note-name">${n.name}</span><span class="note-hint">${n.label.replace('＋', '+')}</span>`;
  notesGrid.appendChild(cell);
  cellMap[i] = cell;
});

// ガイドを右手と左手に分けて表示
const rightHand = NOTE_MAP.filter(n => n.hand === 'Right');
const leftHand = NOTE_MAP.filter(n => n.hand === 'Left');

const rightTitle = document.createElement('div');
rightTitle.className = 'guide-section-title';
rightTitle.textContent = '右手';
guide.appendChild(rightTitle);

rightHand.forEach(n => {
  const row = document.createElement('div');
  row.className = 'guide-row';
  row.innerHTML = `<span class="guide-fingers">${n.label}</span><span class="guide-note">${n.name}</span>`;
  guide.appendChild(row);
});

const leftTitle = document.createElement('div');
leftTitle.className = 'guide-section-title';
leftTitle.textContent = '左手';
guide.appendChild(leftTitle);

leftHand.forEach(n => {
  const row = document.createElement('div');
  row.className = 'guide-row';
  row.innerHTML = `<span class="guide-fingers">${n.label}</span><span class="guide-note">${n.name}</span>`;
  guide.appendChild(row);
});

const visBars = document.getElementById('vis-bars');
for (let i = 0; i < 28; i++) {
  const b = document.createElement('div');
  b.className = 'vis-bar';
  visBars.appendChild(b);
}
const bars = [...visBars.querySelectorAll('.vis-bar')];

// ── ビジュアライザー ───────────────────────────────────
let visFrame = 0;
function animateBars(activeNotes) {
  bars.forEach((bar, i) => {
    if (activeNotes.length > 0) {
      const v = activeNotes.reduce((s, ni) => {
        return s + Math.abs(Math.sin((visFrame * 0.2 + i * 0.42) * (NOTE_MAP[ni].freq / 110)));
      }, 0) / activeNotes.length;
      bar.style.height = Math.round(3 + v * 26) + 'px';
      bar.classList.add('lit');
    } else {
      bar.style.height = '3px';
      bar.classList.remove('lit');
    }
  });
  visFrame++;
}

// ── ピンチ判定 ─────────────────────────────────────────
function dist(a, b) {
  return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2 + (a.z-b.z)**2);
}

function detectPinches(lm, handedness) {
  const pinched = new Set();
  const ref = dist(lm[0], lm[9]);
  NOTE_MAP.forEach((n, ni) => {
    if (n.hand !== handedness) return;
    const d = dist(lm[FINGERTIPS[n.fingers[0]]], lm[FINGERTIPS[n.fingers[1]]]);
    if (d < ref * 0.38) pinched.add(ni);
  });
  return pinched;
}

// ── 手の描画 ───────────────────────────────────────────
const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17],
];

function drawHand(ctx2d, lm, w, h, pinched) {
  ctx2d.strokeStyle = 'rgba(29,158,117,0.55)';
  ctx2d.lineWidth = 2;
  CONNECTIONS.forEach(([a,b]) => {
    ctx2d.beginPath();
    ctx2d.moveTo(lm[a].x*w, lm[a].y*h);
    ctx2d.lineTo(lm[b].x*w, lm[b].y*h);
    ctx2d.stroke();
  });

  lm.forEach((pt, i) => {
    ctx2d.beginPath();
    ctx2d.arc(pt.x*w, pt.y*h, FINGERTIPS.includes(i) ? 5 : 3, 0, Math.PI*2);
    ctx2d.fillStyle = FINGERTIPS.includes(i) ? '#1D9E75' : 'rgba(29,158,117,0.4)';
    ctx2d.fill();
  });

  const activeTips = new Set();
  NOTE_MAP.forEach((n, ni) => {
    if (pinched.has(ni)) n.fingers.forEach(fi => activeTips.add(FINGERTIPS[fi]));
  });

  activeTips.forEach(ti => {
    ctx2d.beginPath();
    ctx2d.arc(lm[ti].x*w, lm[ti].y*h, 11, 0, Math.PI*2);
    ctx2d.strokeStyle = '#EF9F27';
    ctx2d.lineWidth = 2.5;
    ctx2d.stroke();
  });

  NOTE_MAP.forEach((n, ni) => {
    if (!pinched.has(ni)) return;
    const t0 = lm[FINGERTIPS[n.fingers[0]]];
    const t1 = lm[FINGERTIPS[n.fingers[1]]];
    const mx = ((t0.x+t1.x)/2)*w;
    const my = ((t0.y+t1.y)/2)*h - 16;
    ctx2d.font = 'bold 14px sans-serif';
    ctx2d.fillStyle = '#EF9F27';
    ctx2d.textAlign = 'center';
    ctx2d.fillText(n.name, mx, my);
  });
}

// ── MediaPipe セットアップ ────────────────────────────
const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const ctx2d    = canvas.getContext('2d');
const placeholder = document.getElementById('placeholder');
const errorMsg = document.getElementById('error-msg');
const startBtn = document.getElementById('start-btn');
const resetBtn = document.getElementById('reset-btn');
const statusDot  = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');

let lastPinched = new Set();
let lastDetectionTime = 0;
const TRACKING_TIMEOUT = 150; // 150msトラッキングが途切れたら音を停止

// リセットボタン
resetBtn.addEventListener('click', () => {
  forceStopAllNotes();
  lastPinched.clear();
  NOTE_MAP.forEach((_, i) => {
    cellMap[i].classList.remove('active');
  });
  console.log('全ての音をリセットしました');
});

function onResults(results) {
  const w = canvas.width;
  const h = canvas.height;
  ctx2d.clearRect(0, 0, w, h);
  ctx2d.drawImage(results.image, 0, 0, w, h);

  let allPinched = new Set();
  const now = Date.now();

  if (results.multiHandLandmarks?.length) {
    lastDetectionTime = now;
    statusDot.className = 'detecting';
    statusText.textContent = `手を検出中 (${results.multiHandLandmarks.length}本)`;

    results.multiHandLandmarks.forEach((lm, idx) => {
      const handedness = results.multiHandedness?.[idx]?.label || 'Right';
      const pinched = detectPinches(lm, handedness);
      pinched.forEach(p => allPinched.add(p));
      drawHand(ctx2d, lm, w, h, pinched);
    });
  } else {
    // 手が検出されない場合
    if (now - lastDetectionTime > TRACKING_TIMEOUT) {
      // トラッキング途切れ: 全ての音を停止
      if (lastPinched.size > 0) {
        console.log('トラッキング途切れ: 音を停止');
        lastPinched.forEach(ni => stopNote(ni));
        lastPinched.clear();
      }
    }
    statusDot.className = 'active';
    statusText.textContent = 'カメラ稼働中';
  }

  // 新しくピンチされた音を開始
  allPinched.forEach(ni => { 
    if (!lastPinched.has(ni)) {
      startNote(NOTE_MAP[ni].freq, ni);
    }
  });
  
  // ピンチが解除された音を停止
  lastPinched.forEach(ni => { 
    if (!allPinched.has(ni)) {
      stopNote(ni);
    }
  });
  
  lastPinched = allPinched;

  NOTE_MAP.forEach((_, i) => {
    cellMap[i].classList.toggle('active', allPinched.has(i));
  });

  animateBars([...allPinched]);
}

async function startCamera() {
  startBtn.textContent = '読み込み中...';
  startBtn.disabled = true;
  getCtx();

  try {
    const hands = new Hands({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });
    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.65,
    });
    hands.onResults(onResults);

    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: 640, height: 480 }
    });
    video.srcObject = stream;
    video.style.display = 'block';
    placeholder.style.display = 'none';
    await video.play();

    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 480;

    statusDot.className = 'active';
    statusText.textContent = 'カメラ稼働中';
    lastDetectionTime = Date.now();

    (async function loop() {
      if (video.readyState >= 2) {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        await hands.send({ image: video });
      }
      requestAnimationFrame(loop);
    })();

  } catch(e) {
    errorMsg.style.display = 'flex';
    errorMsg.innerHTML = `<span>⚠️</span><span>カメラにアクセスできませんでした。<br>${e.message}</span>`;
    statusText.textContent = 'エラー';
    startBtn.textContent = 'カメラ起動';
    startBtn.disabled = false;
    placeholder.style.display = 'none';
  }
}

startBtn.addEventListener('click', startCamera);

// 定期的にビジュアライザーを更新
setInterval(() => {
  if (!video.srcObject) animateBars([]);
}, 50);

// ページを離れる時に全ての音を停止
window.addEventListener('beforeunload', () => {
  forceStopAllNotes();
});
</script>
</body>
</html>
