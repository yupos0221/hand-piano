<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hand Piano — 指のピンチで演奏</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="logo">Hand<span>Piano</span></div>
  <div class="header-right">
    <div id="status">
      <div id="status-dot"></div>
      <span id="status-text">カメラ未起動</span>
    </div>
    <button id="cam-toggle-btn" disabled>📷 カメラ画像</button>
    <button id="reset-btn" title="全ての音をリセット">🔄 リセット</button>
  </div>
</header>

<main>
  <!-- 1. カメラ映像（鳴っている音を重畳） -->
  <div id="camera-wrap">
    <video id="video" playsinline></video>
    <canvas id="canvas"></canvas>
    <div id="note-overlay"></div>
    <div id="octave-cam-bar">
      <span id="oct-cam-label">OCTAVE</span>
      <span class="oct-seg" id="oct-cam-low">低</span>
      <span class="oct-seg" id="oct-cam-mid">中</span>
      <span class="oct-seg" id="oct-cam-high">高</span>
    </div>
    <div id="placeholder">
      <div class="placeholder-icon">🎹</div>
      <p>カメラを起動して<br>指のピンチで演奏しよう</p>
      <button id="start-btn">カメラ起動</button>
    </div>
    <div id="error-msg"></div>
  </div>

  <div id="visualizer">
    <div id="vis-label">SOUND</div>
    <div id="vis-bars"></div>
  </div>

  <!-- 2. オクターブモード -->
  <div id="octave-panel">
    <div id="oct-panel-label">OCTAVE MODE</div>
    <button id="octave-mode-btn">オクターブモード OFF</button>
    <div id="oct-panel-segs">
      <span class="oct-seg" id="oct-p-low">低<br><small>近い</small></span>
      <span class="oct-seg" id="oct-p-mid">中<br><small>通常</small></span>
      <span class="oct-seg" id="oct-p-high">高<br><small>遠い</small></span>
    </div>
  </div>

  <!-- 3. 楽器選択 -->
  <div id="instrument-selector">
    <div id="inst-label">INSTRUMENT</div>
    <div id="inst-buttons">
      <button class="inst-btn active" data-inst="piano">ピアノ</button>
      <button class="inst-btn" data-inst="trumpet">トランペット</button>
      <button class="inst-btn" data-inst="guitar">ギター</button>
      <button class="inst-btn" data-inst="clarinet">クラリネット</button>
      <button class="inst-btn" data-inst="flute">フルート</button>
      <button class="inst-btn" data-inst="bell">ベル</button>
    </div>
  </div>

  <!-- 4. ピンチ対応表 -->
  <div class="card">
    <div class="card-label">ピンチ対応表</div>
    <div id="guide"></div>
  </div>
</main>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="script.js"></script>
</body>
</html>
