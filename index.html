<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hand Piano — 指のピンチで演奏</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="logo">Hand<span>Piano</span></div>
  <div class="header-right">
    <button id="reset-btn" title="全ての音をリセット">🔄 リセット</button>
    <div id="status">
      <div id="status-dot"></div>
      <span id="status-text">カメラ未起動</span>
    </div>
  </div>
</header>

<main>
  <div id="camera-wrap">
    <video id="video" playsinline></video>
    <canvas id="canvas"></canvas>
    <div id="placeholder">
      <div class="placeholder-icon">🎹</div>
      <p>カメラを起動して<br>指のピンチで演奏しよう</p>
      <button id="start-btn">カメラ起動</button>
    </div>
    <div id="error-msg"></div>
  </div>

  <div id="right-panel">
    <div class="card">
      <div class="card-label">鳴っている音</div>
      <div id="notes-grid"></div>
    </div>
    <div class="card">
      <div class="card-label">ピンチ対応表</div>
      <div id="guide"></div>
    </div>
  </div>

  <div id="visualizer">
    <div id="vis-label">SOUND</div>
    <div id="vis-bars"></div>
  </div>

  <div id="instrument-selector">
    <div id="inst-label">INSTRUMENT</div>
    <div id="inst-buttons">
      <button class="inst-btn active" data-inst="piano">ピアノ</button>
      <button class="inst-btn" data-inst="trumpet">トランペット</button>
      <button class="inst-btn" data-inst="guitar">ギター</button>
      <button class="inst-btn" data-inst="clarinet">クラリネット</button>
      <button class="inst-btn" data-inst="flute">フルート</button>
      <button class="inst-btn" data-inst="bell">ベル</button>
    </div>
  </div>
</main>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="script.js"></script>
</body>
</html>
